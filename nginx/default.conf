# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name your-domain.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name your-domain.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/your-domain.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # 프론트엔드 정적 파일
    location / {
        root /var/www/kakeibu/client/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # JS/CSS 파일은 장기 캐시 (해시 포함되어 있으므로 안전)
    location ~* \.(js|css)$ {
        root /var/www/kakeibu/client/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker는 캐시 금지
    location = /sw.js {
        root /var/www/kakeibu/client/dist;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 백엔드 API 프록시
    location /api {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
