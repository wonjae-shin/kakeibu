spring.datasource.url=jdbc:h2:mem:testdb;DATABASE_TO_UPPER=FALSE;NON_KEYWORDS=USER,TRANSACTION,ACCOUNT,CATEGORY,BUDGET,NOTIFICATION,ORDER,MONTH,DATE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.sql.init.mode=never

app.jwt.secret=test-secret-key-min-32-chars-long-enough
app.jwt.refresh-secret=test-refresh-secret-key-min-32-chars
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000
