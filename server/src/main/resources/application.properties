spring.datasource.url=jdbc:sqlite:./prisma/dev.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-additions.sql

app.jwt.secret=${JWT_SECRET:dev-secret-key-min-32-chars-long-enough}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:dev-refresh-secret-key-min-32-chars}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

server.port=8080
